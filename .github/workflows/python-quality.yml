name: Python quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Ruff correctness gate
        run: >-
          uvx --from ruff==0.15.22 ruff check
          --select E9,F63,F7,F82 .

